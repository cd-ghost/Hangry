<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANGRY Restaurant</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'hangry/style.css' %}">
    <style>
       
        body {
            background: url('https://t4.ftcdn.net/jpg/05/30/94/15/360_F_530941532_cRnI3XVospM5knxsBSTE4VOy9LxbbUsf.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        header h3 {
            margin: 0;
            font-size: 24px;
        }
        nav {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 5px;
            text-align: center;
            position: relative;
            width: 100%;
            bottom: 0;
            margin-top: 40px;
        }
        section {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            margin: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
